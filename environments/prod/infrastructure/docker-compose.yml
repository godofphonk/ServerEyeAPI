# Infrastructure Services for Production
# PostgreSQL, TimescaleDB, Redis
# Secrets are injected via Doppler

services:
  # PostgreSQL for metadata
  api-postgres:
    image: postgres:15-alpine
    container_name: ServerEyeAPI-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=servereye
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD
    command: postgres -c ssl=off
    volumes:
      - servereye_postgres_prod_data:/var/lib/postgresql/data
      - ../../../deployments:/migrations:ro
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

  # TimescaleDB for time-series data
  api-timescaledb:
    image: timescale/timescaledb:2.15.0-pg15
    container_name: ServerEyeAPI-timescaledb-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=servereye
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD
    command: >
      postgres
      -c ssl=off
      -c shared_preload_libraries=timescaledb
      -c timescaledb.max_background_workers=8
      -c timescaledb.query_chunk_size=100000
      -c max_connections=100
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=50
      -c random_page_cost=1.1
      -c effective_io_concurrency=50
    volumes:
      - servereye_timescaledb_prod_data:/var/lib/postgresql/data
      - ../../../deployments/timescaledb/timescaledb-init.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql
      - ../../../deployments/timescaledb/timescaledb-multi-tier.sql:/docker-entrypoint-initdb.d/init-multi-tier.sql
      - ../../../deployments:/migrations:ro
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # PostgreSQL for static/persistent server data
  api-postgres-static:
    image: postgres:15-alpine
    container_name: ServerEyeAPI-postgres-static-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=servereye
      - POSTGRES_USER=servereye
      - POSTGRES_PASSWORD
    command: postgres -c ssl=off
    volumes:
      - servereye_postgres_static_prod_data:/var/lib/postgresql/data
      - ../../../deployments/static-postgres/migration-005-static-data.sql:/docker-entrypoint-initdb.d/init-static-data.sql
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servereye"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

  # Redis for caching
  api-redis:
    image: redis:7-alpine
    container_name: ServerEyeAPI-redis-prod
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - servereye_redis_prod_data:/data
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

networks:
  servereye-network:
    external: true
    name: servereye-network

volumes:
  servereye_postgres_prod_data:
    driver: local
    name: ServerEyeAPI_postgres_prod
  servereye_timescaledb_prod_data:
    driver: local
    name: ServerEyeAPI_timescaledb_prod
  servereye_postgres_static_prod_data:
    driver: local
    name: ServerEyeAPI_postgres_static_prod
  servereye_redis_prod_data:
    driver: local
    name: ServerEyeAPI_redis_prod
