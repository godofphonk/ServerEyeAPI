# Backend Service for Development
# ServerEyeAPI

services:
  servereye-api:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: ServerEyeAPI-api-dev
    command: ["./servereye"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@api-postgres:5432/servereye?sslmode=disable
      - KEYS_DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@api-postgres:5432/servereye?sslmode=disable
      - TIMESCALEDB_URL=postgres://postgres:${POSTGRES_PASSWORD}@api-timescaledb:5432/servereye?sslmode=disable
      - STATIC_DATA_URL=postgres://servereye:${POSTGRES_PASSWORD}@api-postgres-static:5432/servereye?sslmode=disable
      - JWT_SECRET
      - WEBHOOK_SECRET
      - WEB_URL
      - POSTGRES_PASSWORD
      - REDIS_URL=redis://:${REDIS_PASSWORD}@api-redis:6379
      - REDIS_PASSWORD
      # TimescaleDB configuration
      - TIMESCALEDB_MAX_CONNECTIONS=50
      - TIMESCALEDB_CONN_TIMEOUT=30s
      - TIMESCALEDB_QUERY_TIMEOUT=15s
      - TIMESCALEDB_HEALTH_CHECK_INTERVAL=30s
      # Data retention
      - METRICS_RETENTION_DAYS=90
      - STATUS_RETENTION_DAYS=30
      - EVENTS_RETENTION_DAYS=60
      - COMMANDS_RETENTION_DAYS=30
      # Redis configuration
      - REDIS_TTL=60s
      - REDIS_CONN_TIMEOUT=5s
      - REDIS_MAX_RETRIES=3
      # WebSocket configuration
      - WS_BUFFER_SIZE=256
      - WS_WRITE_TIMEOUT=30s
      - WS_READ_TIMEOUT=300s
      - WS_PING_INTERVAL=30s
      - WS_PONG_WAIT=120s
    volumes:
      - ../../../logs:/app/logs
      - ../../../.env:/app/.env:ro
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

networks:
  servereye-network:
    external: true
    name: servereye-network
