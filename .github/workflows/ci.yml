name: CI/CD Pipeline

on:
  push:
    branches: [ master, production ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, production ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: godofphonk/servereyeapi

jobs:
  # Test and Quality Checks
  test-and-quality:
    name: Tests and Quality Checks
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/production'  # Skip tests on production
    permissions:
      contents: read
      security-events: read
      actions: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
        
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Download dependencies
      run: go mod download
      
    - name: Verify dependencies
      run: go mod verify
      
    - name: Run tests
      run: go test -v -coverprofile=coverage.out ./...
      
    - name: Extract coverage percentage
      id: coverage
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "📊 Test Coverage: ${COVERAGE}%"
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Run security scan
      run: |
        go install github.com/securecodewarrior/gosec/v2/cmd/gosec@latest
        gosec -no-fail -fmt sarif -out results.sarif ./... || echo "{}" > results.sarif
      continue-on-error: true
      
    - name: Ensure SARIF file exists
      run: |
        if [ ! -f results.sarif ]; then
          echo '{"runs": []}' > results.sarif
        fi
      
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif
      continue-on-error: true
      if: always()
      
    - name: Check for vulnerabilities
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  # Lint and Format
  lint:
    name: Code Quality and Linting
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/production'  # Skip linting on production
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
        
    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "❌ Code is not formatted properly"
          gofmt -s -l .
          exit 1
        fi
        echo "✅ Code is properly formatted"
        
    - name: Run go vet
      run: go vet ./...

  # Build Docker Image
  build:
    name: Build and Push Docker Image
    needs: []
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production' || startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Set BUILD_DATE and VERSION
      run: |
        echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
        echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
        echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container
        driver-opts: |
          image=moby/buildkit:buildx-stable-1
          
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=production,enable={{is_default_branch}}
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          BUILD_DATE=${{ env.BUILD_DATE }}
          VERSION=${{ env.VERSION }}
          COMMIT_SHA=${{ env.COMMIT_SHA }}
        no-cache: true
        pull: true
        
    - name: Verify multi-tier metrics implementation
      run: |
        echo "=== Verifying multi-tier metrics implementation ==="
        
        # Check for key files
        if [ ! -f "internal/services/tiered_metrics.go" ]; then
          echo "❌ TieredMetricsService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/services/metrics_commands.go" ]; then
          echo "❌ MetricsCommandsService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/storage/timescaledb/multi_tier_metrics.go" ]; then
          echo "❌ Multi-tier metrics storage file not found!"
          exit 1
        fi
        
        # Check for key implementations
        if ! grep -q "TieredMetricsService" internal/services/tiered_metrics.go; then
          echo "❌ TieredMetricsService implementation not found!"
          exit 1
        fi
        
        if ! grep -q "MetricsCommandsService" internal/services/metrics_commands.go; then
          echo "❌ MetricsCommandsService implementation not found!"
          exit 1
        fi
        
        echo "✅ Multi-tier metrics implementation verified!"
        
        # Check for Alert system implementation
        if [ ! -f "internal/services/alert_service.go" ]; then
          echo "❌ AlertService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/handlers/alerts.go" ]; then
          echo "❌ AlertHandler file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/storage/repositories/timescaledb/alert_repository.go" ]; then
          echo "❌ AlertRepository file not found!"
          exit 1
        fi
        
        if [ ! -f "deployments/migration-009-alerts-table.sql" ]; then
          echo "❌ Alerts migration file not found!"
          exit 1
        fi
        
        # Check for WebSocket implementation
        if [ ! -f "internal/websocket/server.go" ]; then
          echo "❌ WebSocket server file not found!"
          exit 1
        fi
        
        if ! grep -q "HandleConnection" internal/websocket/server.go; then
          echo "❌ WebSocket HandleConnection not found!"
          exit 1
        fi
        
        echo "✅ Alert system implementation verified!"
        echo "✅ WebSocket implementation verified!"

  # Deploy to Production
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    environment: production
    
    steps:
    - name: Deploy to production
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          set -e
          
          echo "🚀 Starting deployment to production..."
          
          # Create backup of current deployment
          if [ -d "/opt/servereye" ]; then
            echo "📦 Creating backup..."
            sudo cp -r /opt/servereye /opt/servereye.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # Ensure directories exist
          sudo mkdir -p /opt/servereye
          cd /opt/servereye
          
          # Pull latest images
          echo "📥 Pulling latest Docker images..."
          sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
          sudo docker rmi ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production 2>/dev/null || true
          sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
          
          # Update docker-compose.yml with new image
          echo "📝 Updating docker-compose configuration..."
          sudo tee docker-compose.prod.yml > /dev/null <<EOF
          services:
            servereye-api:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
              container_name: servereye-api
              restart: unless-stopped
              ports:
                - "8080:8080"
              environment:
                - HOST=0.0.0.0
                - PORT=8080
                - DATABASE_URL=postgres://postgres:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/servereye?sslmode=disable
                - KEYS_DATABASE_URL=postgres://postgres:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/servereye?sslmode=disable
                - TIMESCALEDB_URL=postgres://postgres:${{ secrets.POSTGRES_PASSWORD }}@timescaledb:5432/servereye?sslmode=disable
                - STATIC_DATA_URL=postgres://postgres:${{ secrets.POSTGRES_PASSWORD }}@postgres-static:5432/servereye?sslmode=disable
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
                - WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
                - WEB_URL=${{ vars.WEB_URL || 'https://api.servereye.dev' }}
                # TimescaleDB configuration
                - TIMESCALEDB_MAX_CONNECTIONS=50
                - TIMESCALEDB_CONN_TIMEOUT=30s
                - TIMESCALEDB_QUERY_TIMEOUT=15s
                - TIMESCALEDB_HEALTH_CHECK_INTERVAL=30s
                # WebSocket configuration
                - WS_BUFFER_SIZE=256
                - WS_WRITE_TIMEOUT=30s
                - WS_READ_TIMEOUT=300s
                - WS_PING_INTERVAL=30s
                - WS_PONG_WAIT=120s
                # Data retention
                - METRICS_RETENTION_DAYS=90
                - STATUS_RETENTION_DAYS=30
                - EVENTS_RETENTION_DAYS=60
                - COMMANDS_RETENTION_DAYS=30
              volumes:
                - ./logs:/app/logs
              networks:
                - servereye-network
              depends_on:
                postgres:
                  condition: service_healthy
                timescaledb:
                  condition: service_healthy
                postgres-static:
                  condition: service_healthy
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s
              deploy:
                resources:
                  limits:
                    memory: 1G
                    cpus: '0.5'
                  reservations:
                    memory: 512M
                    cpus: '0.25'
          
            # PostgreSQL for metadata
            postgres:
              image: postgres:15-alpine
              container_name: servereye-postgres
              restart: unless-stopped
              environment:
                POSTGRES_DB: servereye
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
              volumes:
                - servereye_postgres_data:/var/lib/postgresql/data
                - ./deployments:/migrations:ro
              networks:
                - servereye-network
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U postgres"]
                interval: 30s
                timeout: 10s
                retries: 3
              deploy:
                resources:
                  limits:
                    memory: 512M
                    cpus: '0.25'
                  reservations:
                    memory: 256M
                    cpus: '0.1'
          
            # TimescaleDB for time-series data
            timescaledb:
              image: timescale/timescaledb:2.15.0-pg15
              container_name: servereye-timescaledb
              restart: unless-stopped
              environment:
                POSTGRES_DB: servereye
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
              volumes:
                - servereye_timescaledb_data:/var/lib/postgresql/data
                - ./deployments/timescaledb-init.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql
              networks:
                - servereye-network
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U postgres"]
                interval: 30s
                timeout: 10s
                retries: 3
              command: >
                postgres
                -c shared_preload_libraries=timescaledb
                -c timescaledb.max_background_workers=16
                -c timescaledb.query_chunk_size=200000
                -c max_connections=200
                -c shared_buffers=1GB
                -c effective_cache_size=4GB
                -c maintenance_work_mem=512MB
                -c checkpoint_completion_target=0.9
                -c wal_buffers=64MB
                -c default_statistics_target=100
                -c random_page_cost=1.1
                -c effective_io_concurrency=200
              deploy:
                resources:
                  limits:
                    memory: 4G
                    cpus: '2.0'
                  reservations:
                    memory: 2G
                    cpus: '1.0'
          
            # PostgreSQL for static data
            postgres-static:
              image: postgres:15-alpine
              container_name: servereye-postgres-static
              restart: unless-stopped
              environment:
                POSTGRES_DB: servereye
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
              volumes:
                - servereye_postgres_static_data:/var/lib/postgresql/data
                - ./deployments/migration-005-static-data.sql:/docker-entrypoint-initdb.d/001-static-data.sql
              networks:
                - servereye-network
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U postgres -d servereye"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 30s
              deploy:
                resources:
                  limits:
                    memory: 512M
                    cpus: '0.25'
                  reservations:
                    memory: 256M
                    cpus: '0.1'
          
          volumes:
            servereye_postgres_data:
              external: true
            servereye_timescaledb_data:
              external: true
            servereye_postgres_static_data:
              external: true
          
          networks:
            servereye-network:
              driver: bridge
              ipam:
                config:
                  - subnet: 172.20.0.0/16
          EOF
          
          # Stop existing services
          echo "⏹️ Stopping existing services..."
          sudo docker-compose -f docker-compose.prod.yml down || true
          sudo docker stop $(sudo docker ps -q) || true
          sudo docker rm $(sudo docker ps -aq) || true
          sudo docker network prune -f
          sudo docker system prune -f
          sudo docker volume prune -f
          
          # Create external volumes
          echo "📦 Creating external volumes..."
          sudo docker volume create servereye_postgres_data || true
          sudo docker volume create servereye_timescaledb_data || true
          sudo docker volume create servereye_postgres_static_data || true
          
          # Start new services
          echo "▶️ Starting new services..."
          sudo docker-compose -f docker-compose.prod.yml up -d
          
          # Wait for services to be ready
          echo "⏳ Waiting for services to be ready..."
          sleep 30
          
          # Run database migrations
          echo "🗄️ Running database migrations..."
          
          # Run PostgreSQL migrations
          echo "📝 Running PostgreSQL migrations..."
          for migration in ./deployments/migration-*.sql; do
            if [ -f "$migration" ]; then
              echo "Applying migration: $(basename $migration)"
              sudo docker exec servereye-postgres psql -U postgres -d servereye -f "/migrations/$(basename $migration)" || echo "Migration already applied or failed: $(basename $migration)"
            fi
          done
          
          # Run TimescaleDB migrations
          echo "📝 Running TimescaleDB migrations..."
          sudo docker exec servereye-timescaledb psql -U postgres -d servereye -f /docker-entrypoint-initdb.d/init-timescaledb.sql || echo "TimescaleDB already initialized"
          
          # Run static data migrations
          echo "📝 Running static data migrations..."
          sudo docker exec servereye-postgres-static psql -U postgres -d servereye -f /docker-entrypoint-initdb.d/init-static.sql || echo "Static DB already initialized"
          
          # Health check
          echo "🏥 Performing health check..."
          for i in {1..10}; do
            if curl -f http://localhost:8080/health; then
              echo "✅ Health check passed!"
              break
            else
              echo "⏳ Waiting for service to be ready... ($i/10)"
              sleep 10
            fi
          done
          
          # Check logs
          echo "📋 Checking service logs..."
          sudo docker-compose -f docker-compose.prod.yml logs --tail=50
          
          # Clean up old images
          echo "🧹 Cleaning up old Docker images..."
          sudo docker image prune -f
          
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Service is available at: http://${{ secrets.PROD_HOST }}:8080"

  # Post-deployment tests
  post-deploy-tests:
    name: Post-deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    
    steps:
    - name: Run post-deployment tests
      run: |
        echo "🧪 Running post-deployment tests..."
        
        # Test health endpoint
        if curl -f http://${{ secrets.PROD_HOST }}:8080/health; then
          echo "✅ Health endpoint is working"
        else
          echo "❌ Health endpoint failed"
          exit 1
        fi
        
        # Test WebSocket endpoint availability
        echo "🔍 Testing WebSocket endpoint..."
        if curl -I -s http://${{ secrets.PROD_HOST }}:8080/ws | grep -q "405\|426"; then
          echo "✅ WebSocket endpoint is available"
        else
          echo "⚠️ WebSocket endpoint may not be configured"
        fi
        
        # Test metrics endpoints (if available)
        echo "🔍 Testing metrics endpoints..."
        
        # Test tiered metrics endpoint
        if curl -f "http://${{ secrets.PROD_HOST }}:8080/api/servers/test-server/metrics/tiered?start=2026-02-14T00:00:00Z&end=2026-02-14T01:00:00Z" > /dev/null 2>&1; then
          echo "✅ Tiered metrics endpoint is working"
        else
          echo "⚠️ Tiered metrics endpoint not available (expected for test environment)"
        fi
        
        # Test alert endpoints structure (without auth)
        echo "🔍 Testing alert endpoints structure..."
        if curl -I -s http://${{ secrets.PROD_HOST }}:8080/api/servers/test-server/alerts | grep -q "200\|401\|404"; then
          echo "✅ Alert endpoints are configured"
        else
          echo "⚠️ Alert endpoints may not be configured"
        fi
        
        echo "✅ Post-deployment tests completed!"
