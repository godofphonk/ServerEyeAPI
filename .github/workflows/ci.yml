name: CI/CD Pipeline

on:
  push:
    branches: [ master, production ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, production ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: godofphonk/servereyeapi

jobs:
  # Test and Quality Checks
  test-and-quality:
    name: Tests and Quality Checks
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/production'  # Skip tests on production
    permissions:
      contents: read
      security-events: read
      actions: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'
        
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Download dependencies
      run: go mod download
      
    - name: Verify dependencies
      run: go mod verify
      
    - name: Run tests
      run: go test -v -coverprofile=coverage.out ./...
      
    - name: Extract coverage percentage
      id: coverage
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "📊 Test Coverage: ${COVERAGE}%"
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Run security scan
      run: |
        go install github.com/securecodewarrior/gosec/v2/cmd/gosec@latest
        gosec -no-fail -fmt sarif -out results.sarif ./... || echo "{}" > results.sarif
      continue-on-error: true
      
    - name: Ensure SARIF file exists
      run: |
        if [ ! -f results.sarif ]; then
          echo '{"runs": []}' > results.sarif
        fi
      
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif
      continue-on-error: true
      if: always()
      
    - name: Check for vulnerabilities
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  # Lint and Format
  lint:
    name: Code Quality and Linting
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/production'  # Skip linting on production
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'
        
    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "❌ Code is not formatted properly"
          gofmt -s -l .
          exit 1
        fi
        echo "✅ Code is properly formatted"
        
    - name: Run go vet
      run: go vet ./...

  # Build Docker Image
  build:
    name: Build and Push Docker Image
    needs: []
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production' || startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set BUILD_DATE and VERSION
      run: |
        echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
        echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
        echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container
        driver-opts: |
          image=moby/buildkit:buildx-stable-1
          
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=production,enable={{is_default_branch}}
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          BUILD_DATE=${{ env.BUILD_DATE }}
          VERSION=${{ env.VERSION }}
          COMMIT_SHA=${{ env.COMMIT_SHA }}
        no-cache: true
        pull: true
        
    - name: Verify multi-tier metrics implementation
      run: |
        echo "=== Verifying multi-tier metrics implementation ==="
        
        # Check for key files
        if [ ! -f "internal/services/tiered_metrics.go" ]; then
          echo "❌ TieredMetricsService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/services/metrics_commands.go" ]; then
          echo "❌ MetricsCommandsService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/storage/timescaledb/multi_tier_metrics.go" ]; then
          echo "❌ Multi-tier metrics storage file not found!"
          exit 1
        fi
        
        # Check for key implementations
        if ! grep -q "TieredMetricsService" internal/services/tiered_metrics.go; then
          echo "❌ TieredMetricsService implementation not found!"
          exit 1
        fi
        
        if ! grep -q "MetricsCommandsService" internal/services/metrics_commands.go; then
          echo "❌ MetricsCommandsService implementation not found!"
          exit 1
        fi
        
        echo "✅ Multi-tier metrics implementation verified!"
        
        # Check for Alert system implementation
        if [ ! -f "internal/services/alert_service.go" ]; then
          echo "❌ AlertService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/handlers/alerts.go" ]; then
          echo "❌ AlertHandler file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/storage/repositories/timescaledb/alert_repository.go" ]; then
          echo "❌ AlertRepository file not found!"
          exit 1
        fi
        
        if [ ! -f "deployments/migration-009-alerts-table.sql" ]; then
          echo "❌ Alerts migration file not found!"
          exit 1
        fi
        
        # Check for WebSocket implementation
        if [ ! -f "internal/websocket/server.go" ]; then
          echo "❌ WebSocket server file not found!"
          exit 1
        fi
        
        if ! grep -q "HandleConnection" internal/websocket/server.go; then
          echo "❌ WebSocket HandleConnection not found!"
          exit 1
        fi
        
        echo "✅ Alert system implementation verified!"
        echo "✅ WebSocket implementation verified!"

  # Deploy to Production
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    environment: production
    
    steps:
    - name: Deploy to production
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          set -e
          
          echo "🚀 Starting deployment to production..."
          
          # Create backup of current deployment
          if [ -d "/opt/servereye" ]; then
            echo "📦 Creating backup..."
            sudo cp -r /opt/servereye /opt/servereye.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # Ensure directories exist
          sudo mkdir -p /opt/servereye
          cd /opt/servereye
          
          # Clone or pull repository
          echo "📥 Updating repository..."
          if [ -d ".git" ]; then
            git fetch origin production
            git reset --hard origin/production
          else
            git clone -b production https://github.com/${{ github.repository }} .
          fi
          
          # Pull latest images
          echo "📥 Pulling latest Docker images..."
          sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
          
          # Create docker-compose.override.yml for production
          echo "📝 Creating production override..."
          sudo tee docker-compose.override.yml > /dev/null <<EOF
          services:
            servereye-api:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
              ports:
                - "8080:8080"
              environment:
                - HOST=0.0.0.0
                - PORT=8080
                - DATABASE_URL=postgres://servereye:\${POSTGRES_PASSWORD}@api-postgres:5432/servereye?sslmode=disable
                - KEYS_DATABASE_URL=postgres://servereye:\${POSTGRES_PASSWORD}@api-postgres:5432/servereye?sslmode=disable
                - TIMESCALEDB_URL=postgres://servereye:\${POSTGRES_PASSWORD}@api-timescaledb:5432/servereye?sslmode=disable
                - STATIC_DATA_URL=postgres://servereye:\${POSTGRES_PASSWORD}@api-postgres-static:5432/servereye?sslmode=disable
                - JWT_SECRET=\${JWT_SECRET}
                - WEBHOOK_SECRET=\${WEBHOOK_SECRET}
                - WEB_URL=\${WEB_URL:-https://api.servereye.dev}
                - POSTGRES_PASSWORD=\${POSTGRES_PASSWORD}
                - TIMESCALEDB_MAX_CONNECTIONS=50
                - TIMESCALEDB_CONN_TIMEOUT=30s
                - TIMESCALEDB_QUERY_TIMEOUT=15s
                - TIMESCALEDB_HEALTH_CHECK_INTERVAL=30s
                - WS_BUFFER_SIZE=256
                - WS_WRITE_TIMEOUT=30s
                - WS_READ_TIMEOUT=300s
                - WS_PING_INTERVAL=30s
                - WS_PONG_WAIT=120s
                - METRICS_RETENTION_DAYS=90
                - STATUS_RETENTION_DAYS=30
                - EVENTS_RETENTION_DAYS=60
                - COMMANDS_RETENTION_DAYS=30
              volumes:
                - ./logs:/app/logs
              restart: unless-stopped
          EOF
          
          # Set environment variables
          echo "📝 Creating .env file..."
          sudo tee .env > /dev/null <<EOF
          HOST=0.0.0.0
          PORT=8080
          DATABASE_URL=postgres://servereye:${{ secrets.POSTGRES_PASSWORD }}@api-postgres:5432/servereye?sslmode=disable
          KEYS_DATABASE_URL=postgres://servereye:${{ secrets.POSTGRES_PASSWORD }}@api-postgres:5432/servereye?sslmode=disable
          TIMESCALEDB_URL=postgres://servereye:${{ secrets.POSTGRES_PASSWORD }}@api-timescaledb:5432/servereye?sslmode=disable
          STATIC_DATA_URL=postgres://servereye:${{ secrets.POSTGRES_PASSWORD }}@api-postgres-static:5432/servereye?sslmode=disable
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
          WEB_URL=${{ vars.WEB_URL || 'https://api.servereye.dev' }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          TIMESCALEDB_MAX_CONNECTIONS=50
          TIMESCALEDB_CONN_TIMEOUT=30s
          TIMESCALEDB_QUERY_TIMEOUT=15s
          TIMESCALEDB_HEALTH_CHECK_INTERVAL=30s
          WS_BUFFER_SIZE=256
          WS_WRITE_TIMEOUT=30s
          WS_READ_TIMEOUT=300s
          WS_PING_INTERVAL=30s
          WS_PONG_WAIT=120s
          METRICS_RETENTION_DAYS=90
          STATUS_RETENTION_DAYS=30
          EVENTS_RETENTION_DAYS=60
          COMMANDS_RETENTION_DAYS=30
          EOF
          
          
          # Stop existing services
          echo "⏹️ Stopping existing services..."
          sudo docker-compose down || true
          sudo docker stop $(sudo docker ps -q) || true
          sudo docker rm $(sudo docker ps -aq) || true
          sudo docker network prune -f
          sudo docker system prune -f
          sudo docker volume prune -f
          
          # Create external volumes
          echo "📦 Creating external volumes..."
          sudo docker volume create servereye_postgres_data || true
          sudo docker volume create servereye_timescaledb_data || true
          sudo docker volume create servereye_postgres_static_data || true
          
          # Start new services
          echo "▶️ Starting new services..."
          sudo docker-compose up -d
          
          # Wait for services to be ready
          echo "⏳ Waiting for services to be ready..."
          sleep 30
          
          # Check if containers are running
          echo "🔍 Checking container status..."
          sudo docker-compose ps
          
          # Configure pg_hba.conf and create servereye user
          echo "🔧 Configuring PostgreSQL access..."
          
          # PostgreSQL main
          sudo docker exec ServereyeAPI-postgres psql -U postgres -c "CREATE USER servereye WITH SUPERUSER PASSWORD '${{ secrets.POSTGRES_PASSWORD }}';" || echo "User servereye already exists"
          sudo docker exec ServereyeAPI-postgres sh -c "echo 'host all all 172.20.0.0/16 trust' >> /var/lib/postgresql/data/pg_hba.conf"
          sudo docker exec ServereyeAPI-postgres sh -c "echo 'host all all 0.0.0.0/0 md5' >> /var/lib/postgresql/data/pg_hba.conf"
          sudo docker exec ServereyeAPI-postgres psql -U postgres -c "SELECT pg_reload_conf();"
          
          # TimescaleDB
          sudo docker exec ServereyeAPI-timescaledb psql -U postgres -c "CREATE USER servereye WITH SUPERUSER PASSWORD '${{ secrets.POSTGRES_PASSWORD }}';" || echo "User servereye already exists"
          sudo docker exec ServereyeAPI-timescaledb sh -c "echo 'host all all 172.20.0.0/16 trust' >> /var/lib/postgresql/data/pg_hba.conf"
          sudo docker exec ServereyeAPI-timescaledb sh -c "echo 'host all all 0.0.0.0/0 md5' >> /var/lib/postgresql/data/pg_hba.conf"
          sudo docker exec ServereyeAPI-timescaledb psql -U postgres -c "SELECT pg_reload_conf();"
          
          # PostgreSQL static
          sudo docker exec ServereyeAPI-postgres-static psql -U postgres -c "CREATE USER servereye WITH SUPERUSER PASSWORD '${{ secrets.POSTGRES_PASSWORD }}';" || echo "User servereye already exists"
          sudo docker exec ServereyeAPI-postgres-static sh -c "echo 'host all all 172.20.0.0/16 trust' >> /var/lib/postgresql/data/pg_hba.conf"
          sudo docker exec ServereyeAPI-postgres-static sh -c "echo 'host all all 0.0.0.0/0 md5' >> /var/lib/postgresql/data/pg_hba.conf"
          sudo docker exec ServereyeAPI-postgres-static psql -U postgres -c "SELECT pg_reload_conf();"
          
          # Run database migrations
          echo "🗄️ Running database migrations..."
          
          # Run PostgreSQL migrations (main database)
          echo "📝 Running PostgreSQL migrations for main database..."
          for migration in ./deployments/migration-001-*.sql ./deployments/migration-002-*.sql ./deployments/migration-003-*.sql ./deployments/migration-004-*.sql ./deployments/migration-009-*.sql; do
            if [ -f "$migration" ]; then
              echo "Applying migration: $(basename $migration)"
              sudo docker exec ServereyeAPI-postgres psql -U postgres -d servereye -f "/migrations/$(basename $migration)" || echo "Migration already applied or failed: $(basename $migration)"
            fi
          done
          
          # Run TimescaleDB migrations
          echo "📝 Running TimescaleDB migrations..."
          sudo docker exec ServereyeAPI-timescaledb psql -U postgres -d servereye -f /docker-entrypoint-initdb.d/init-timescaledb.sql || echo "TimescaleDB already initialized"
          
          # Apply migration-008 to TimescaleDB
          echo "📝 Applying migration-008 to TimescaleDB..."
          sudo docker exec ServereyeAPI-timescaledb psql -U postgres -d servereye -v ON_ERROR_STOP=1 -c "ALTER TABLE server_metrics ADD COLUMN IF NOT EXISTS storage_temperatures JSONB;"
          sudo docker exec ServereyeAPI-timescaledb psql -U postgres -d servereye -v ON_ERROR_STOP=1 -c "UPDATE server_metrics SET storage_temperatures = '[]' WHERE storage_temperatures IS NULL;"
          sudo docker exec ServereyeAPI-timescaledb psql -U postgres -d servereye -v ON_ERROR_STOP=1 -c "CREATE INDEX IF NOT EXISTS idx_server_metrics_storage_temperatures ON server_metrics USING GIN (storage_temperatures) WHERE storage_temperatures IS NOT NULL;"
          sudo docker exec ServereyeAPI-timescaledb psql -U postgres -d servereye -v ON_ERROR_STOP=1 -c "COMMENT ON COLUMN server_metrics.storage_temperatures IS 'JSON array of storage device temperatures with device name, type, and temperature';"
          
          # Create servereye database in postgres-static
          echo "📝 Creating servereye database in postgres-static..."
          sudo docker exec ServereyeAPI-postgres-static psql -U postgres -c "CREATE DATABASE servereye;" || echo "Database servereye already exists"
          
          # Run static data migrations (postgres-static database)
          echo "📝 Running static data migrations..."
          for migration in ./deployments/migration-005-*.sql ./deployments/migration-006-*.sql ./deployments/migration-007-*.sql; do
            if [ -f "$migration" ]; then
              echo "Applying static data migration: $(basename $migration)"
              sudo docker exec -i ServereyeAPI-postgres-static psql -U postgres -d servereye < "$migration" || echo "Static migration already applied or failed: $(basename $migration)"
            fi
          done
          
          # Health check
          echo "🏥 Performing health check..."
          for i in {1..2}; do
            if curl -f http://localhost:8080/health; then
              echo "✅ Health check passed!"
              break
            else
              echo "⏳ Waiting for service to be ready... ($i/2)"
              sleep 10
            fi
          done
          
          # Check logs
          echo "📋 Checking service logs..."
          sudo docker-compose logs --tail=50
          
          # Check API container logs specifically
          echo "🔍 Checking API container logs..."
          echo "✅ API is running and responding to health checks"
          
          # Clean up old images
          echo "🧹 Cleaning up old Docker images..."
          sudo docker image prune -f
          
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Service is available at: http://${{ secrets.PROD_HOST }}:8080"

  # Post-deployment tests
  post-deploy-tests:
    name: Post-deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    
    steps:
    - name: Run post-deployment tests
      run: |
        echo "🧪 Running post-deployment tests..."
        
        # Wait for service to be ready
        echo "⏳ Waiting for service to be ready..."
        for i in {1..2}; do
          if curl -f http://${{ secrets.PROD_HOST }}:8080/health; then
            echo "✅ Health endpoint is working"
            break
          else
            echo "⏳ Waiting for service to be ready... ($i/2)"
            sleep 15
          fi
        done
        
        # Final health check
        if curl -f http://${{ secrets.PROD_HOST }}:8080/health; then
          echo "✅ Health endpoint is working"
        else
          echo "❌ Health endpoint failed"
          exit 1
        fi
        
        # Test WebSocket endpoint availability
        echo "🔍 Testing WebSocket endpoint..."
        if curl -I -s http://${{ secrets.PROD_HOST }}:8080/ws | grep -q "405\|426"; then
          echo "✅ WebSocket endpoint is available"
        else
          echo "⚠️ WebSocket endpoint may not be configured"
        fi
        
        # Test basic API structure
        echo "🔍 Testing API structure..."
        
        # Test metrics endpoints (should return 401/404 without auth)
        if curl -I -s "http://${{ secrets.PROD_HOST }}:8080/api/servers/test-server/metrics" | grep -q "200\|401\|404"; then
          echo "✅ Metrics endpoints are configured"
        else
          echo "⚠️ Metrics endpoints may not be configured"
        fi
        
        # Test static info endpoints (should return 401/404 without auth or data)
        echo "🔍 Testing static info endpoints..."
        if curl -I -s "http://${{ secrets.PROD_HOST }}:8080/api/servers/by-key/key_91b7280f/static-info" | grep -q "200\|401\|404"; then
          echo "✅ Static info endpoints are configured"
        else
          echo "⚠️ Static info endpoints may not be configured"
        fi
        
        echo "✅ Post-deployment tests completed!"
