name: CI/CD Pipeline

on:
  push:
    branches: [ master, production ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, production ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: godofphonk/servereyeapi

jobs:
  # Test and Quality Checks
  test-and-quality:
    name: Tests and Quality Checks
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/production'  # Skip tests on production
    permissions:
      contents: read
      security-events: write
      actions: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum', '**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Download dependencies
      run: go mod download
      
    - name: Verify dependencies
      run: go mod verify
      
    - name: Run tests
      run: go test -v -coverprofile=coverage.out ./...
      
    - name: Extract coverage percentage
      id: coverage
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "📊 Test Coverage: ${COVERAGE}%"
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Run security scan
      run: |
        go install github.com/securecodewarrior/gosec/v2/cmd/gosec@latest
        gosec -no-fail -fmt sarif -out results.sarif ./... || echo "{}" > results.sarif
      continue-on-error: true
      
    - name: Ensure SARIF file exists
      run: |
        if [ ! -f results.sarif ]; then
          echo '{"runs": []}' > results.sarif
        fi
        # Ensure file is valid JSON
        if ! jq empty results.sarif 2>/dev/null; then
          echo '{"runs": []}' > results.sarif
        fi
      
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif
      continue-on-error: true
      if: always()
      
    - name: Check for vulnerabilities
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  # Lint and Format
  lint:
    name: Code Quality and Linting
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/production'  # Skip linting on production
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        
    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "❌ Code is not formatted properly"
          gofmt -s -l .
          exit 1
        fi
        echo "✅ Code is properly formatted"
        
    - name: Run go vet
      run: go vet ./...

  # Build Docker Image
  build:
    name: Build and Push Docker Image
    needs: []
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production' || startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set BUILD_DATE and VERSION
      run: |
        echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
        echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
        echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container
        driver-opts: |
          image=moby/buildkit:buildx-stable-1
          
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=production,enable={{is_default_branch}}
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          BUILD_DATE=${{ env.BUILD_DATE }}
          VERSION=${{ env.VERSION }}
          COMMIT_SHA=${{ env.COMMIT_SHA }}
        no-cache: true
        pull: true
        
    - name: Verify multi-tier metrics implementation
      run: |
        echo "=== Verifying multi-tier metrics implementation ==="
        
        # Check for key files
        if [ ! -f "internal/services/tiered_metrics.go" ]; then
          echo "❌ TieredMetricsService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/services/metrics_commands.go" ]; then
          echo "❌ MetricsCommandsService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/storage/timescaledb/multi_tier_metrics.go" ]; then
          echo "❌ Multi-tier metrics storage file not found!"
          exit 1
        fi
        
        # Check for key implementations
        if ! grep -q "TieredMetricsService" internal/services/tiered_metrics.go; then
          echo "❌ TieredMetricsService implementation not found!"
          exit 1
        fi
        
        if ! grep -q "MetricsCommandsService" internal/services/metrics_commands.go; then
          echo "❌ MetricsCommandsService implementation not found!"
          exit 1
        fi
        
        echo "✅ Multi-tier metrics implementation verified!"
        
        # Check for Alert system implementation
        if [ ! -f "internal/services/alert_service.go" ]; then
          echo "❌ AlertService file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/handlers/alerts.go" ]; then
          echo "❌ AlertHandler file not found!"
          exit 1
        fi
        
        if [ ! -f "internal/storage/repositories/timescaledb/alert_repository.go" ]; then
          echo "❌ AlertRepository file not found!"
          exit 1
        fi
        
        if [ ! -f "deployments/postgres/migration-009-alerts-table.sql" ]; then
          echo "❌ Alerts migration file not found!"
          exit 1
        fi
        
        if [ ! -f "deployments/postgres/migration-010-server-source-identifiers.sql" ]; then
          echo "❌ Server source identifiers migration file not found!"
          exit 1
        fi
        
        if [ ! -f "deployments/postgres/migration-011-add-telegram-id.sql" ]; then
          echo "❌ Telegram ID migration file not found!"
          exit 1
        fi
        
        # Check for WebSocket implementation
        if [ ! -f "internal/websocket/server.go" ]; then
          echo "❌ WebSocket server file not found!"
          exit 1
        fi
        
        if ! grep -q "HandleConnection" internal/websocket/server.go; then
          echo "❌ WebSocket HandleConnection not found!"
          exit 1
        fi
        
        # Check for TimescaleDB multi-tier implementation
        if [ ! -f "deployments/timescaledb/timescaledb-multi-tier.sql" ]; then
          echo "❌ TimescaleDB multi-tier migration file not found!"
          exit 1
        fi
        
        if ! grep -q "metrics_1m_avg" deployments/timescaledb/timescaledb-multi-tier.sql; then
          echo "❌ 1-minute metrics aggregate not found!"
          exit 1
        fi
        
        if ! grep -q "metrics_5m_avg" deployments/timescaledb/timescaledb-multi-tier.sql; then
          echo "❌ 5-minute metrics aggregate not found!"
          exit 1
        fi
        
        if ! grep -q "get_metrics_by_granularity" deployments/timescaledb/timescaledb-multi-tier.sql; then
          echo "❌ Multi-tier granularity function not found!"
          exit 1
        fi
        
        # Check for optimized granularity system
        if [ ! -f "deployments/timescaledb/timescaledb-optimized-granularity.sql" ]; then
          echo "❌ Optimized granularity migration file not found!"
          exit 1
        fi
        
        if [ ! -f "deployments/timescaledb/timescaledb-optimized-function.sql" ]; then
          echo "❌ Optimized granularity function migration file not found!"
          exit 1
        fi
        
        if [ ! -f "deployments/timescaledb/migration-012-optimized-granularity.sql" ]; then
          echo "❌ Optimized granularity master migration file not found!"
          exit 1
        fi
        
        if ! grep -q "metrics_30m_avg" deployments/timescaledb/timescaledb-optimized-granularity.sql; then
          echo "❌ 30-minute metrics aggregate not found!"
          exit 1
        fi
        
        if ! grep -q "metrics_2h_avg" deployments/timescaledb/timescaledb-optimized-granularity.sql; then
          echo "❌ 2-hour metrics aggregate not found!"
          exit 1
        fi
        
        if ! grep -q "metrics_6h_avg" deployments/timescaledb/timescaledb-optimized-granularity.sql; then
          echo "❌ 6-hour metrics aggregate not found!"
          exit 1
        fi
        
        echo "✅ Alert system implementation verified!"
        echo "✅ WebSocket implementation verified!"
        echo "✅ TimescaleDB multi-tier implementation verified!"
        echo "✅ Optimized granularity system verified!"

  # Deploy to Production
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/production'
    environment:
      name: production
      url: https://api.servereye.dev

    steps:
      - name: Deploy stacks on VPS
        uses: appleboy/ssh-action@v1
        env:
          REMOTE_GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          REMOTE_GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DOPPLER_TOKEN_BACKEND: ${{ secrets.DOPPLER_TOKEN_BACKEND }}
          DOPPLER_TOKEN_INFRASTRUCTURE: ${{ secrets.DOPPLER_TOKEN_INFRASTRUCTURE }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          REPO_REF: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          IMAGE_BACKEND: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          command_timeout: 40m
          envs: REMOTE_GHCR_USERNAME,REMOTE_GHCR_TOKEN,DOPPLER_TOKEN_BACKEND,DOPPLER_TOKEN_INFRASTRUCTURE,REPO_URL,REPO_REF,DEPLOY_SHA,IMAGE_BACKEND
          script: |
            set -Eeuo pipefail

            APP_DIR="/opt/servereye"

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            echo "==> Validating prerequisites"
            command -v git >/dev/null 2>&1 || { echo "git is required"; exit 1; }
            command -v docker >/dev/null 2>&1 || { echo "docker is required"; exit 1; }
            docker compose version >/dev/null 2>&1 || { echo "docker compose v2 is required"; exit 1; }
            command -v doppler >/dev/null 2>&1 || { echo "doppler CLI is required on VPS"; exit 1; }

            echo "==> Preparing application directory"
            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch "$REPO_REF" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout "$REPO_REF"
            git reset --hard "origin/$REPO_REF"

            echo "==> Verifying compose files"
            test -f environments/prod/backend/docker-compose.yml
            test -f environments/prod/infrastructure/docker-compose.yml

            echo "==> Saving rollback information"
            BACKEND_CID="$(docker compose -f environments/prod/backend/docker-compose.yml ps -q servereye-api 2>/dev/null || true)"

            PREV_BACKEND_IMAGE_ID=""

            if [ -n "$BACKEND_CID" ]; then
              PREV_BACKEND_IMAGE_ID="$(docker inspect -f '{{.Image}}' "$BACKEND_CID")"
            fi

            cat > "$APP_DIR/deployment-info.env" <<EOF
            PREV_BACKEND_IMAGE_ID=$PREV_BACKEND_IMAGE_ID
            PREV_DEPLOY_SHA=$DEPLOY_SHA
            EOF

            echo "==> Logging in to GHCR"
            echo "$REMOTE_GHCR_TOKEN" | docker login ghcr.io -u "$REMOTE_GHCR_USERNAME" --password-stdin

            echo "==> Pulling exact images for this commit"
            docker pull "$IMAGE_BACKEND:production"

            echo "==> Starting infrastructure"
            DOPPLER_TOKEN="$DOPPLER_TOKEN_INFRASTRUCTURE" \
            doppler run --project servereyeapi --config prd_infrastructure -- \
            docker compose -f environments/prod/infrastructure/docker-compose.yml up -d --force-recreate --remove-orphans

            echo "==> Waiting for databases to be ready"
            sleep 20

            echo "==> Running database migrations"

            if [ -f "./deployments/init-schema.sql" ]; then
              docker exec -i ServerEyeAPI-postgres-prod psql -U postgres -d servereye < "./deployments/init-schema.sql" || echo "Schema already initialized"
            fi

            for migration in ./deployments/postgres/migration-*.sql; do
              if [ -f "$migration" ]; then
                echo "Applying migration: $(basename $migration)"
                docker exec -i ServerEyeAPI-postgres-prod psql -U postgres -d servereye < "$migration" || echo "Migration already applied: $(basename $migration)"
              fi
            done

            if [ -f "./deployments/timescaledb/timescaledb-init.sql" ]; then
              docker exec -i ServerEyeAPI-timescaledb-prod psql -U postgres -d servereye < "./deployments/timescaledb/timescaledb-init.sql"
            fi

            if [ -f "./deployments/timescaledb/timescaledb-multi-tier.sql" ]; then
              docker exec -i ServerEyeAPI-timescaledb-prod psql -U postgres -d servereye < "./deployments/timescaledb/timescaledb-multi-tier.sql"
            fi

            docker exec ServerEyeAPI-timescaledb-prod psql -U postgres -d servereye -c "ALTER TABLE server_metrics ADD COLUMN IF NOT EXISTS storage_temperatures JSONB;" || true

            if [ -f "./deployments/static-postgres/migration-005-static-data.sql" ]; then
              docker exec -i ServerEyeAPI-postgres-static-prod psql -U servereye -d servereye < "./deployments/static-postgres/migration-005-static-data.sql" || echo "Static schema already initialized"
            fi

            for migration in ./deployments/static-postgres/migration-*.sql; do
              if [ -f "$migration" ] && [[ "$migration" != *"migration-005"* ]]; then
                echo "Applying static migration: $(basename $migration)"
                docker exec -i ServerEyeAPI-postgres-static-prod psql -U servereye -d servereye < "$migration" || echo "Static migration already applied: $(basename $migration)"
              fi
            done

            echo "==> Starting backend"
            DOPPLER_TOKEN="$DOPPLER_TOKEN_BACKEND" \
            doppler run --project servereyeapi --config prd_backend -- \
            docker compose -f environments/prod/backend/docker-compose.yml up -d --force-recreate --remove-orphans

            echo "==> Configuring nginx"
            if ! command -v nginx >/dev/null 2>&1; then
              $SUDO apt-get update
              $SUDO apt-get install -y nginx
              $SUDO systemctl enable nginx
            fi

            $SUDO mkdir -p /etc/nginx/ssl
            $SUDO cp "$APP_DIR/environments/prod/nginx/api.servereye.dev.conf" /etc/nginx/sites-available/api.servereye.dev.conf

            if [ ! -L /etc/nginx/sites-enabled/api.servereye.dev.conf ]; then
              $SUDO ln -s /etc/nginx/sites-available/api.servereye.dev.conf /etc/nginx/sites-enabled/api.servereye.dev.conf
            fi

            $SUDO rm -f /etc/nginx/sites-enabled/default
            $SUDO nginx -t
            $SUDO systemctl reload nginx

            echo "==> Verifying running containers"
            docker compose -f environments/prod/backend/docker-compose.yml ps
            docker compose -f environments/prod/infrastructure/docker-compose.yml ps

            echo "==> Backend health check"
            backend_ok=false
            for i in 1 2 3 4 5 6; do
              if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
                backend_ok=true
                break
              fi
              sleep $((i * 5))
            done

            if [ "$backend_ok" != "true" ]; then
              echo "Backend health check failed"
              docker compose -f environments/prod/backend/docker-compose.yml logs --tail=200 || true
              exit 1
            fi

            echo "==> Cleaning up dangling images"
            docker image prune -f

            echo "✅ Deployment successful"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        env:
          DOPPLER_TOKEN_BACKEND: ${{ secrets.DOPPLER_TOKEN_BACKEND }}
          DOPPLER_TOKEN_INFRASTRUCTURE: ${{ secrets.DOPPLER_TOKEN_INFRASTRUCTURE }}
          IMAGE_BACKEND: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          command_timeout: 30m
          envs: DOPPLER_TOKEN_BACKEND,DOPPLER_TOKEN_INFRASTRUCTURE,IMAGE_BACKEND
          script: |
            set -Eeuo pipefail

            APP_DIR="/opt/servereye"

            if [ ! -f "$APP_DIR/deployment-info.env" ]; then
              echo "No rollback metadata found"
              exit 1
            fi

            cd "$APP_DIR"
            source "$APP_DIR/deployment-info.env"

            echo "==> Rolling back"

            if [ -n "${PREV_BACKEND_IMAGE_ID:-}" ]; then
              docker tag "$PREV_BACKEND_IMAGE_ID" "$IMAGE_BACKEND:production"
            fi

            DOPPLER_TOKEN="$DOPPLER_TOKEN_INFRASTRUCTURE" \
            doppler run --project servereyeapi --config prd_infrastructure -- \
            docker compose -f environments/prod/infrastructure/docker-compose.yml up -d --force-recreate --remove-orphans

            DOPPLER_TOKEN="$DOPPLER_TOKEN_BACKEND" \
            doppler run --project servereyeapi --config prd_backend -- \
            docker compose -f environments/prod/backend/docker-compose.yml up -d --force-recreate --remove-orphans

            echo "✅ Rollback finished"

  # Post-deployment tests
  post-deploy-tests:
    name: Post-deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    
    steps:
    - name: Run post-deployment tests
      run: |
        echo "🧪 Running post-deployment tests..."
        
        # Wait for service to be ready
        echo "⏳ Waiting for service to be ready..."
        for i in {1..2}; do
          if curl -f http://${{ secrets.PROD_HOST }}:8080/health; then
            echo "✅ Health endpoint is working"
            break
          else
            echo "⏳ Waiting for service to be ready... ($i/2)"
            sleep 15
          fi
        done
        
        # Final health check
        if curl -f http://${{ secrets.PROD_HOST }}:8080/health; then
          echo "✅ Health endpoint is working"
        else
          echo "❌ Health endpoint failed"
          exit 1
        fi
        
        # Test WebSocket endpoint availability
        echo "🔍 Testing WebSocket endpoint..."
        if curl -I -s http://${{ secrets.PROD_HOST }}:8080/ws | grep -q "405\|426"; then
          echo "✅ WebSocket endpoint is available"
        else
          echo "⚠️ WebSocket endpoint may not be configured"
        fi
        
        # Test basic API structure
        echo "🔍 Testing API structure..."
        
        # Test metrics endpoints (should return 401/404 without auth)
        if curl -I -s "http://${{ secrets.PROD_HOST }}:8080/api/servers/test-server/metrics" | grep -q "200\|401\|404"; then
          echo "✅ Metrics endpoints are configured"
        else
          echo "⚠️ Metrics endpoints may not be configured"
        fi
        
        # Test static info endpoints (should return 401/404 without auth or data)
        echo "🔍 Testing static info endpoints..."
        if curl -I -s "http://${{ secrets.PROD_HOST }}:8080/api/servers/by-key/key_91b7280f/static-info" | grep -q "200\|401\|404"; then
          echo "✅ Static info endpoints are configured"
        else
          echo "⚠️ Static info endpoints may not be configured"
        fi
        
        # Test multi-tier metrics endpoints
        echo "🔍 Testing multi-tier metrics endpoints..."
        if curl -I -s "http://${{ secrets.PROD_HOST }}:8080/api/servers/test-server/metrics/tiered?start=$(date -d '1 hour ago' -Iseconds)&end=$(date -Iseconds)" | grep -q "200\|401\|404"; then
          echo "✅ Multi-tier metrics endpoints are configured"
        else
          echo "⚠️ Multi-tier metrics endpoints may not be configured"
        fi
        
        echo "✅ Post-deployment tests completed!"
