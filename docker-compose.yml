services:
  servereye-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ServerEyeAPI-api
    command: ["./servereye"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://postgres:password@api-postgres:5432/servereye?sslmode=disable
      - KEYS_DATABASE_URL=postgres://postgres:password@api-postgres:5432/servereye?sslmode=disable
      - TIMESCALEDB_URL=postgres://postgres:password@api-timescaledb:5432/servereye?sslmode=disable
      - STATIC_DATA_URL=postgres://servereye:password@api-postgres-static:5432/servereye?sslmode=disable
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - WEBHOOK_SECRET=your-webhook-secret-change-in-production
      - WEB_URL=http://localhost:3000
      # TimescaleDB configuration
      - TIMESCALEDB_MAX_CONNECTIONS=50
      - TIMESCALEDB_CONN_TIMEOUT=30s
      - TIMESCALEDB_QUERY_TIMEOUT=15s
      - TIMESCALEDB_HEALTH_CHECK_INTERVAL=30s
      # Data retention
      - METRICS_RETENTION_DAYS=90
      - STATUS_RETENTION_DAYS=30
      - EVENTS_RETENTION_DAYS=60
      - COMMANDS_RETENTION_DAYS=30
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    networks:
      - servereye-network
    depends_on:
      api-postgres:
        condition: service_healthy
      api-postgres-static:
        condition: service_healthy
      api-timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # PostgreSQL for metadata
  api-postgres:
    image: postgres:15-alpine
    container_name: ServerEyeAPI-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: servereye
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - servereye_postgres_data:/var/lib/postgresql/data
      - ./deployments:/migrations:ro
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

  # TimescaleDB for time-series data
  api-timescaledb:
    image: timescale/timescaledb:2.15.0-pg15
    container_name: ServerEyeAPI-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: servereye
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - servereye_timescaledb_data:/var/lib/postgresql/data
      - ./deployments/timescaledb/timescaledb-init.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql
      - ./deployments/timescaledb/timescaledb-multi-tier.sql:/docker-entrypoint-initdb.d/init-multi-tier.sql
      - ./deployments:/migrations:ro
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c timescaledb.max_background_workers=8
      -c timescaledb.query_chunk_size=100000
      -c max_connections=100
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=50
      -c random_page_cost=1.1
      -c effective_io_concurrency=50
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # PostgreSQL for static/persistent server data
  api-postgres-static:
    image: postgres:15-alpine
    container_name: ServerEyeAPI-postgres-static
    restart: unless-stopped
    environment:
      POSTGRES_DB: servereye
      POSTGRES_USER: servereye
      POSTGRES_PASSWORD: password
    volumes:
      - servereye_postgres_static_data:/var/lib/postgresql/data
      - ./deployments/static-postgres/migration-005-static-data.sql:/docker-entrypoint-initdb.d/init-static-data.sql
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servereye"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

volumes:
  servereye_postgres_data:
    external: true
  servereye_timescaledb_data:
    external: true
  servereye_postgres_static_data:
    external: true

networks:
  servereye-network:
    external: true
